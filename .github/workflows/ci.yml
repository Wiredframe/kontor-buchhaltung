name: CI

on:
  push:
    branches: [ main ]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: PII-Check & Tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: PII-Check (keine Personendaten im Repo)
        run: ./scripts/pii-check.sh

      - name: Build & Test
        run: |
          xcodebuild test \
            -scheme Kontor \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO
